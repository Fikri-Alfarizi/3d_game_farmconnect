<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-BRUTAL GAMEPAD TESTER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap');

        :root {
            --bg: #ffea00;
            --card: #ffffff;
            --accent: #00ff88;
            --text: #000000;
            --border: #000000;
            --shadow: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Exo 2', sans-serif;
            color: var(--text);
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 64px;
            text-transform: uppercase;
            background: #fff;
            display: inline-block;
            padding: 10px 30px;
            border: 8px solid var(--border);
            box-shadow: 15px 15px 0px var(--shadow);
            margin-bottom: 40px;
            transform: rotate(-2deg);
        }

        .card {
            background: var(--card);
            border: 6px solid var(--border);
            padding: 30px;
            box-shadow: 10px 10px 0px var(--shadow);
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        select {
            font-family: inherit;
            font-size: 20px;
            padding: 10px 20px;
            border: 4px solid var(--border);
            background: #fff;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            background: var(--accent);
        }

        #gp-info {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 4px dashed #000;
        }

        .tester-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .section-title {
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: #ff4081;
            color: #fff;
            display: inline-block;
            padding: 5px 15px;
            border: 3px solid #000;
        }

        /* Buttons Visual */
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .btn-box {
            background: #fff;
            border: 4px solid var(--border);
            padding: 15px;
            text-align: center;
            font-weight: 900;
            box-shadow: 4px 4px 0px var(--shadow);
            transition: all 0.05s;
        }

        .btn-box.pressed {
            background: var(--accent);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--shadow);
        }

        /* Joysticks Visual */
        .axes-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .joystick-box {
            width: 150px;
            height: 150px;
            background: #fff;
            border: 4px solid var(--border);
            position: relative;
            margin: 0 auto;
            box-shadow: 6px 6px 0px var(--shadow);
        }

        .joystick-dot {
            width: 30px;
            height: 30px;
            background: #ff4081;
            border: 3px solid #000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .axis-label {
            text-align: center;
            margin-top: 10px;
            font-weight: 700;
        }

        /* Raw Data */
        #raw-data {
            font-family: monospace;
            background: #eee;
            padding: 20px;
            border: 4px solid #000;
            margin-top: 30px;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .hint {
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Gamepad Tester</h1>

        <div class="card">
            <div class="section-title">Manual Selection</div>
            <div class="controls">
                <select id="gp-select">
                    <option value="-1">Select a Gamepad...</option>
                </select>
                <button id="refresh-btn"
                    style="padding: 10px 20px; font-family: inherit; font-size: 20px; border: 4px solid #000; background: #fff; cursor: pointer; box-shadow: 4px 4px 0px #000;">Refresh</button>
            </div>
            <div id="gp-info">Not Connected</div>

            <div class="tester-grid">
                <!-- Buttons -->
                <div>
                    <div class="section-title">Buttons</div>
                    <div class="buttons-container" id="buttons-root">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- Axes -->
                <div>
                    <div class="section-title">Axes (Joysticks)</div>
                    <div class="axes-container">
                        <div>
                            <div class="joystick-box" id="joy-0">
                                <div class="joystick-dot" id="dot-0"></div>
                            </div>
                            <div class="axis-label">Left Stick (Axes 0, 1)</div>
                        </div>
                        <div>
                            <div class="joystick-box" id="joy-1">
                                <div class="joystick-dot" id="dot-1"></div>
                            </div>
                            <div class="axis-label">Right Stick (Axes 2, 3)</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-title" style="margin-top: 40px; background: #00e5ff;">Raw JSON Data</div>
            <div id="raw-data">Connect and select a gamepad to see data...</div>
        </div>

        <div class="hint">* Press any button on your gamepad to make it appear in the browser.</div>
    </div>

    <script>
        const gpSelect = document.getElementById('gp-select');
        const refreshBtn = document.getElementById('refresh-btn');
        const gpInfo = document.getElementById('gp-info');
        const buttonsRoot = document.getElementById('buttons-root');
        const rawData = document.getElementById('raw-data');

        let selectedIdx = -1;

        // Initialize button boxes
        for (let i = 0; i < 20; i++) {
            const div = document.createElement('div');
            div.className = 'btn-box';
            div.id = `btn-${i}`;
            div.textContent = `B${i}`;
            buttonsRoot.appendChild(div);
        }

        function updateGPList() {
            const current = gpSelect.value;
            gpSelect.innerHTML = '<option value="-1">Select a Gamepad...</option>';
            const gps = navigator.getGamepads ? navigator.getGamepads() : [];
            let found = false;
            for (let i = 0; i < gps.length; i++) {
                if (gps[i]) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `ID ${i}: ${gps[i].id}`;
                    gpSelect.appendChild(opt);
                    if (i == current) found = true;
                }
            }
            if (found) gpSelect.value = current;
            else selectedIdx = -1;
        }

        window.addEventListener('gamepadconnected', updateGPList);
        window.addEventListener('gamepaddisconnected', updateGPList);
        refreshBtn.addEventListener('click', updateGPList);

        gpSelect.addEventListener('change', (e) => {
            selectedIdx = parseInt(e.target.value);
        });

        function update() {
            const gps = navigator.getGamepads ? navigator.getGamepads() : [];
            const gp = gps[selectedIdx];

            if (gp) {
                gpInfo.textContent = `CONNECTED: ${gp.id} | Index: ${gp.index}`;

                // Update Buttons
                gp.buttons.forEach((btn, i) => {
                    const el = document.getElementById(`btn-${i}`);
                    if (el) {
                        if (btn.pressed) el.classList.add('pressed');
                        else el.classList.remove('pressed');
                    }
                });

                // Update Axes
                updateJoystick('dot-0', gp.axes[0] || 0, gp.axes[1] || 0);
                updateJoystick('dot-1', gp.axes[2] || 0, gp.axes[3] || 0);

                // Update Raw Data (selective to avoid massive strings)
                const debugInfo = {
                    id: gp.id,
                    index: gp.index,
                    mapping: gp.mapping,
                    buttons: gp.buttons.map(b => b.value.toFixed(2)),
                    axes: gp.axes.map(a => a.toFixed(3))
                };
                rawData.textContent = JSON.stringify(debugInfo, null, 2);
            } else {
                gpInfo.textContent = selectedIdx === -1 ? "Please select a gamepad" : "Disconnected or not selected";
                // Reset visuals
                document.querySelectorAll('.btn-box').forEach(b => b.classList.remove('pressed'));
                updateJoystick('dot-0', 0, 0);
                updateJoystick('dot-1', 0, 0);
                if (selectedIdx !== -1) rawData.textContent = "Waiting for data...";
            }

            requestAnimationFrame(update);
        }

        function updateJoystick(id, x, y) {
            const dot = document.getElementById(id);
            // Translate range -1 to 1 to percentage (inside 150px box minus 30px dot = 120px travel)
            // But CSS center is 50%, so let's use translate.
            const moveX = x * 60; // range -60 to 60
            const moveY = y * 60;
            dot.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        }

        updateGPList();
        update();
    </script>
</body>

</html>
